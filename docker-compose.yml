# ──────────────────────────────────────────────────────────────
#  YAML-anchors: общие блоки, чтобы не дублировать build/env
# ──────────────────────────────────────────────────────────────
x-backend-build: &backend-build
  build:
    context: backend
    dockerfile: Dockerfile

x-backend-env: &backend-env
  env_file:
    - .env
  environment: &backend-environment
    DB_HOST: db
    DB_PORT: "5432"
    REDIS_URL: redis://redis:6379/0

x-celery-env: &celery-env
  env_file:
    - .env
  environment:
    <<: *backend-environment
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/1

# Зависимости: БД + Redis здоровы, миграция выполнена.
x-backend-depends: &backend-depends
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully

# ──────────────────────────────────────────────────────────────
#  Services
# ──────────────────────────────────────────────────────────────
services:

  # ---- PostgreSQL ----
  db:
    image: postgres:17-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      # Пароль обязателен — compose упадёт, если переменная не задана.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-postgres}

    # Для отладки с хоста — раскомментировать:
    # ports:
    #   - "6432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped

    # Для отладки с хоста — раскомментировать:
    # ports:
    #   - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---- Миграции (одноразовый контейнер) ----
  migrate:
    <<: [*backend-build, *backend-env]
    restart: "no"

    depends_on:
      db:
        condition: service_healthy

    command: ["alembic", "upgrade", "head"]

  # ---- FastAPI ----
  api:
    <<: [*backend-build, *backend-env, *backend-depends]

    restart: unless-stopped
    init: true                # tini как PID 1 — корректные сигналы, без zombie-процессов

    ports:
      - "8000:8000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- Celery Worker: выполняет фоновые задачи ----
  celery-worker:
    <<: [*backend-build, *celery-env, *backend-depends]

    restart: unless-stopped
    init: true
    # Даём worker время на завершение текущих задач при остановке.
    stop_grace_period: 30s

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A src.tasks.celery_config:celery_app inspect ping --timeout 5",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    command:
      [
        "celery",
        "-A", "src.tasks.celery_config:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
      ]

  # ---- Celery Beat: планировщик периодических задач ----
  celery-beat:
    <<: [*backend-build, *celery-env]

    restart: unless-stopped
    init: true

    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    command:
      [
        "celery",
        "-A", "src.tasks.celery_config:celery_app",
        "beat",
        "--loglevel=info",
      ]

volumes:
  postgres_data:
  redis_data:
