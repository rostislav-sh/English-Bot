services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped

    environment:
      # Берем значения из .env, иначе используем безопасные дефолты.
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}

    # Для отладки с хоста — раскомментировать:
#    ports:
#      - "6432:5432"

    volumes:
      # Данные Postgres сохраняются между перезапусками.
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    # Для отладки с хоста — раскомментировать:
#    ports:
#     - "6379:6379"

    volumes:
      # Данные Redis сохраняются между перезапусками (если включен AOF/RDB).
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  migrate:
    build:
      context: backend
      dockerfile: Dockerfile

    restart: "no"

    env_file:
      - /.env

    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0

    depends_on:
      db:
        condition: service_healthy

    command: ["/app/.venv/bin/alembic", "upgrade", "head"]

  api:
    build:
      context: backend
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - /.env

    environment:
      # Внутренняя сеть Compose: сервисы доступны по именам.
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

      migrate:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD-SHELL", "/app/.venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- Celery Worker: выполняет фоновые задачи ----
  celery-worker:
    build:
      context: backend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - /.env

    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

      migrate:
        condition: service_completed_successfully

    command:
      [
        "/app/.venv/bin/celery",
        "-A", "src.tasks.celery_config:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
      ]

  # ---- Celery Beat: планировщик периодических задач ----
  celery-beat:
    build:
      context: backend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - /.env

    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

    depends_on:
      redis:
        condition: service_healthy

      celery-worker:
        condition: service_started

    command:
      [
        "/app/.venv/bin/celery",
        "-A", "src.tasks.celery_config:celery_app",
        "beat",
        "--loglevel=info",
      ]

volumes:
  postgres_data:
  redis_data: